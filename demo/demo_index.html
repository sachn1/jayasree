<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>malayalam-stroker — interactive demo</title>
  <link rel="stylesheet" href="../js/src/style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 520px;
      margin: 3rem auto;
      text-align: center;
      --ms-ink-color: #1a1a2e;
      --ms-ghost-color: #e0daf5;
      --ms-stylus-color: #e8b84b;
      color: #1a1a2e;
    }
    p.sub { color: #6b6591; font-size: 0.9rem; margin-bottom: 1.5rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    input[type="text"] {
      flex: 1;
      font: inherit;
      font-size: 1.4rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid #e0daf5;
      border-radius: 8px;
      text-align: center;
    }
    button {
      font: inherit;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: #af95db;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .chips { margin-bottom: 1rem; font-size: 0.85rem; }
    .chips button {
      background: none; color: #6d28d9;
      border: 1px solid #e0daf5;
      padding: 0.2rem 0.6rem; margin: 0.15rem;
      font-size: 0.9rem;
    }
    .chips button:hover { background: #f3f0fb; }
    #stage {
      border: 1px solid #e0daf5;
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #stage svg { width: 100%; height: auto; max-height: 200px; overflow: visible; }
    #status { color: #b00020; font-size: 0.82rem; min-height: 1.1rem; margin-bottom: 0.5rem; }
    #replay { margin-top: 1rem; background: none; color: #6d28d9; border: 1px solid #af95db; }
  </style>
</head>
<body>
  <h1>malayalam-stroker</h1>
  <p class="sub">Type any word and watch it be written.</p>

  <form id="traceForm">
    <input id="wordInput" type="text" value="നന്ദി" lang="ml" autocomplete="off" />
    <button type="submit" id="traceBtn">Trace</button>
  </form>

  <div class="chips">
    Try: &nbsp;
    <button type="button" data-word="നന്ദി">നന്ദി</button>
    <button type="button" data-word="മലയാളം">മലയാളം</button>
    <button type="button" data-word="ആലയം">ആലയം</button>
    <button type="button" data-word="ക്ഷമിക്കണം">ക്ഷമിക്കണം</button>
    <button type="button" data-word="സ്നേഹം">സ്നേഹം</button>
  </div>

  <div id="status"></div>
  <div id="stage"></div>
  <button id="replay" type="button">↺ Replay</button>

  <!-- Stroke library loader -->
  <div id="lib-bar" style="margin-top:1.2rem; padding-top:1rem; border-top:1px solid #e0daf5;">
    <p style="font-size:0.8rem; color:#6b6591; margin-bottom:0.5rem;">
      Load hand-authored strokes from the recorder:
    </p>
    <label id="lib-drop" style="
      display:block; border:2px dashed #c4b5e8; border-radius:8px;
      padding:0.6rem 1rem; font-size:0.82rem; color:#6b6591;
      cursor:pointer; text-align:center; transition:border-color 0.15s;
    ">
      Drop <strong>stroke-library.json</strong> here or click to browse
      <input type="file" id="lib-file" accept=".json" style="display:none" />
    </label>
    <p id="lib-status" style="font-size:0.78rem; color:#6d28d9; min-height:1rem; margin-top:0.3rem;"></p>
  </div>

  <script type="module">
    import { createStrokeWriter, STROKE_LIBRARY } from "../js/src/index.js";

    const writer = createStrokeWriter(document.getElementById("stage"));
    const form   = document.getElementById("traceForm");
    const input  = document.getElementById("wordInput");
    const status = document.getElementById("status");
    const btn    = document.getElementById("traceBtn");

    // Load bundled glyph data once — no server or font needed
    await writer.load("../js/src/glyph-data.json");
    // Load hand-authored stroke paths if available (silent no-op if file absent)
    await writer.loadStrokes("../js/src/stroke-data.json");

    async function traceWord(word) {
      word = word.trim();
      if (!word) return;
      status.textContent = "";
      btn.disabled = true;
      try {
        await writer.play(word);
      } catch (err) {
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    }

    form.addEventListener("submit", e => { e.preventDefault(); traceWord(input.value); });
    document.querySelectorAll(".chips button").forEach(b =>
      b.addEventListener("click", () => { input.value = b.dataset.word; traceWord(input.value); })
    );
    document.getElementById("replay").addEventListener("click", () => writer.replay());

    // ── Stroke library drag-and-drop ──────────────────────────────────
    const libDrop   = document.getElementById("lib-drop");
    const libFile   = document.getElementById("lib-file");
    const libStatus = document.getElementById("lib-status");

    function loadLibrary(file) {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          const count = Object.keys(data).length;
          Object.assign(STROKE_LIBRARY, data);
          libStatus.textContent = `✓ Loaded ${count} glyph${count !== 1 ? "s" : ""} — replay to see authored strokes`;
          libDrop.style.borderColor = "#6d28d9";
          // Replay immediately so the result is visible right away
          writer.replay();
        } catch {
          libStatus.textContent = "Could not parse JSON — is this a stroke-library export?";
        }
      };
      reader.readAsText(file);
    }

    libDrop.addEventListener("click",    () => libFile.click());
    libFile.addEventListener("change",   () => libFile.files[0] && loadLibrary(libFile.files[0]));
    libDrop.addEventListener("dragover",  e => { e.preventDefault(); libDrop.style.borderColor = "#6d28d9"; });
    libDrop.addEventListener("dragleave", () => libDrop.style.borderColor = "#c4b5e8");
    libDrop.addEventListener("drop",      e => { e.preventDefault(); libDrop.style.borderColor = "#c4b5e8"; e.dataTransfer.files[0] && loadLibrary(e.dataTransfer.files[0]); });

    traceWord(input.value);
  </script>
</body>
</html>
